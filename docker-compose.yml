services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: oryx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oryx
      POSTGRES_PASSWORD: oryx
      POSTGRES_DB: oryx
    ports:
      # Host 55432 -> container 5432 (avoids conflict with any local Postgres on 5432/5433)
      - "55432:5432"
    volumes:
      - oryx-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oryx -d oryx"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oryx-pg-data:
